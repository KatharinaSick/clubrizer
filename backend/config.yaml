server:
  port: 8080
database:
  url: ${DB_URL}
jwt:
  accessToken:
    issuer: clubrizer.com
    headerName: Authorization
    secretKey: ${JWT_ACCESS_TOKEN_SECRET_KEY}
  refreshToken:
    issuer: clubrizer.com
    cookieName: clubrizer.refreshToken
    secretKey: ${JWT_REFRESH_TOKEN_SECRET_KEY}
    secure: false
    sameSite: Lax
  user:
    key: user
resend:
  apiKey: ${RESEND_API_KEY}
  fromAddress: ${RESEND_FROM_ADDRESS}
gcs:
  profilePicturesBucketName: ${GCS_PROFILE_PICTURES_BUCKET_NAME}
cors:
  allowedOrigins:
    - http://localhost:5173
  allowedHeaders:
    - '*'