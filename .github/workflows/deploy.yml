name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/migrations/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -sSL https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz -C /tmp
          sudo mv /tmp/migrate /usr/local/bin/migrate

      - name: Run migrations
        run: migrate -database "${{ secrets.DB_URL }}" -path database/migrations up

  deploy-backend:
    name: Deploy backend to Cloud Run
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: europe-west1-docker.pkg.dev/clubrizer-gcloud/clubrizer/backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: clubrizer-backend
          region: europe-west1
          image: europe-west1-docker.pkg.dev/clubrizer-gcloud/clubrizer/backend:${{ github.sha }}
          flags: --allow-unauthenticated --service-account=clubrizer-backend@clubrizer-gcloud.iam.gserviceaccount.com
          secrets: |
            DB_URL=DB_URL:latest
            JWT_ACCESS_TOKEN_SECRET_KEY=JWT_ACCESS_TOKEN_SECRET_KEY:latest
            JWT_REFRESH_TOKEN_SECRET_KEY=JWT_REFRESH_TOKEN_SECRET_KEY:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
          env_vars: JWT_REFRESH_TOKEN_SECURE=true
